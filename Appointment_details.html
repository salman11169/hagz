<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل الموعد - نظام فرز المواعيد الذكي</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{font-family:'Cairo',sans-serif;box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#2563eb;--secondary:#0ea5e9;
  --success:#10b981;--warning:#f59e0b;--danger:#ef4444;
  --dark:#1e293b;--muted:#64748b;
  --gp:linear-gradient(135deg,#2563eb,#0ea5e9);
}
body{background:linear-gradient(135deg,#f0f7ff,#e8f4fd);min-height:100vh;padding:2rem 0;}

.container{max-width:900px;}

.back-link{
  display:inline-flex;align-items:center;gap:.5rem;
  color:var(--primary);font-weight:700;text-decoration:none;
  margin-bottom:1.5rem;transition:all .3s;
}
.back-link:hover{gap:.8rem;}

.appt-card{
  background:#fff;border-radius:24px;
  box-shadow:0 8px 30px rgba(37,99,235,.1);
  border:2px solid #f1f5f9;overflow:hidden;
  animation:slideUp .5s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

.appt-header{
  padding:2.5rem;background:var(--gp);color:#fff;
  position:relative;overflow:hidden;
}
.appt-header::before{
  content:'';position:absolute;width:300px;height:300px;
  background:rgba(255,255,255,.08);border-radius:50%;
  top:-100px;left:-100px;
}
.appt-header-content{position:relative;z-index:2;}
.appt-id{
  font-size:1rem;font-weight:700;opacity:.85;margin-bottom:.5rem;
}
.appt-title{
  font-size:2rem;font-weight:900;margin-bottom:1rem;
}
.appt-status-badge{
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.5rem 1.3rem;border-radius:20px;
  font-size:.85rem;font-weight:800;
  background:rgba(255,255,255,.2);
  backdrop-filter:blur(10px);
}

.appt-body{padding:2.5rem;}

.section{margin-bottom:2.5rem;}
.section:last-child{margin-bottom:0;}
.section-title{
  font-weight:800;font-size:1.15rem;color:var(--dark);
  margin-bottom:1.2rem;display:flex;align-items:center;gap:.6rem;
}
.section-title i{color:var(--primary);font-size:1.4rem;}

.info-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:1.2rem;
}
.info-item{
  background:#f8fafc;border-radius:14px;padding:1.2rem;
  border:2px solid #e8f0fe;
}
.info-label{
  font-size:.75rem;font-weight:700;color:var(--muted);
  margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.5px;
}
.info-value{
  font-size:1rem;font-weight:800;color:var(--dark);
  display:flex;align-items:center;gap:.5rem;
}
.priority-dot{
  width:10px;height:10px;border-radius:50%;
  display:inline-block;
}
.dot-normal{background:var(--success);}
.dot-urgent{background:var(--warning);}
.dot-emergency{background:var(--danger);}

.symptoms-list{
  display:flex;flex-wrap:wrap;gap:.7rem;
}
.symptom-chip{
  padding:.5rem 1.2rem;border-radius:20px;
  background:rgba(37,99,235,.08);color:var(--primary);
  font-size:.85rem;font-weight:700;
  display:flex;align-items:center;gap:.5rem;
}

.timeline{position:relative;padding-right:2rem;}
.timeline::before{
  content:'';position:absolute;top:0;bottom:0;right:0;
  width:3px;background:linear-gradient(180deg,var(--primary),var(--secondary));
  border-radius:3px;
}
.timeline-item{
  position:relative;padding:1rem 1.5rem 1rem 0;margin-bottom:1rem;
}
.timeline-item::before{
  content:'';position:absolute;right:-7px;top:1.3rem;
  width:17px;height:17px;border-radius:50%;
  background:#fff;border:3px solid var(--primary);
  box-shadow:0 0 0 5px rgba(37,99,235,.15);
}
.timeline-item.done::before{
  background:var(--success);border-color:var(--success);
  box-shadow:0 0 0 5px rgba(16,185,129,.15);
}
.timeline-time{
  font-size:.75rem;font-weight:700;color:var(--muted);
  margin-bottom:.3rem;
}
.timeline-title{
  font-size:.95rem;font-weight:800;color:var(--dark);
}

.action-buttons{
  display:flex;gap:1rem;flex-wrap:wrap;
  padding:2rem 2.5rem;background:#f8fafc;
  border-top:2px solid #f1f5f9;
}
.btn{
  flex:1;padding:.9rem 1.5rem;border-radius:12px;
  border:none;font-weight:800;font-size:.95rem;
  cursor:pointer;transition:all .3s;
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  text-decoration:none;
}
.btn-primary{background:var(--gp);color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(37,99,235,.45);color:#fff;}
.btn-outline{background:#fff;color:var(--primary);border:2px solid var(--primary);}
.btn-outline:hover{background:var(--primary);color:#fff;}
.btn-danger{background:rgba(239,68,68,.1);color:var(--danger);border:2px solid rgba(239,68,68,.3);}
.btn-danger:hover{background:var(--danger);color:#fff;}

.doctor-card{
  display:flex;align-items:center;gap:1.2rem;
  background:#f8fafc;border-radius:16px;padding:1.3rem;
  border:2px solid #e8f0fe;
}
.doctor-avatar{
  width:60px;height:60px;border-radius:50%;
  background:var(--gp);display:flex;align-items:center;
  justify-content:center;font-size:1.5rem;color:#fff;
  font-weight:900;flex-shrink:0;
  box-shadow:0 4px 14px rgba(37,99,235,.3);
}
.doctor-info{flex:1;}
.doctor-name{font-size:1.05rem;font-weight:800;color:var(--dark);margin-bottom:.3rem;}
.doctor-spec{font-size:.85rem;color:var(--muted);font-weight:600;}
.doctor-rating{
  display:flex;align-items:center;gap:.3rem;margin-top:.4rem;
  color:#f59e0b;font-size:.85rem;font-weight:700;
}

@media(max-width:768px){
  body{padding:1rem;}
  .appt-header{padding:1.8rem;}
  .appt-body{padding:1.8rem;}
  .action-buttons{padding:1.5rem;flex-direction:column;}
  .appt-title{font-size:1.5rem;}
}
</style>
</head>
<body>

<div class="container">
  
  <a href="patient-dashboard.html" class="back-link">
    <i class='bx bx-arrow-back'></i>
    العودة للوحة التحكم
  </a>

  <div class="appt-card">
    
    <!-- Header -->
    <div class="appt-header">
      <div class="appt-header-content">
        <div class="appt-id" id="apptId">رقم الحجز: #APT-12345</div>
        <h1 class="appt-title" id="apptService">موعد طبي</h1>
        <span class="appt-status-badge" id="statusBadge">
          <i class='bx bx-time'></i> قيد الانتظار
        </span>
      </div>
    </div>

    <!-- Body -->
    <div class="appt-body">

      <!-- Basic Info -->
      <div class="section">
        <h2 class="section-title">
          <i class='bx bx-info-circle'></i>
          معلومات الموعد
        </h2>
        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">التاريخ</div>
            <div class="info-value" id="apptDate">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">الوقت</div>
            <div class="info-value" id="apptTime">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">التخصص</div>
            <div class="info-value" id="apptSpec">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">نوع الزيارة</div>
            <div class="info-value" id="visitType">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">الأولوية</div>
            <div class="info-value" id="priority">
              <span class="priority-dot dot-normal"></span> —
            </div>
          </div>
          <div class="info-item">
            <div class="info-label">وقت الانتظار المتوقع</div>
            <div class="info-value" id="waitTime">—</div>
          </div>
        </div>
      </div>

      <!-- Doctor -->
      <div class="section">
        <h2 class="section-title">
          <i class='bx bx-user-pin'></i>
          الطبيب المعالج
        </h2>
        <div class="doctor-card" id="doctorCard">
          <div class="doctor-avatar">د</div>
          <div class="doctor-info">
            <div class="doctor-name" id="doctorName">—</div>
            <div class="doctor-spec" id="doctorSpec">—</div>
            <div class="doctor-rating">
              <i class='bx bxs-star'></i>
              <span id="doctorRating">—</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Symptoms -->
      <div class="section">
        <h2 class="section-title">
          <i class='bx bx-heart'></i>
          الأعراض والشكوى
        </h2>
        <div class="symptoms-list" id="symptomsList"></div>
        <div class="info-grid" style="margin-top:1rem;">
          <div class="info-item">
            <div class="info-label">شدة الألم</div>
            <div class="info-value" id="painLevel">—</div>
          </div>
          <div class="info-item">
            <div class="info-label">مدة الأعراض</div>
            <div class="info-value" id="duration">—</div>
          </div>
        </div>
      </div>

      <!-- Timeline -->
      <div class="section">
        <h2 class="section-title">
          <i class='bx bx-time-five'></i>
          سجل الموعد
        </h2>
        <div class="timeline" id="timeline">
          <div class="timeline-item done">
            <div class="timeline-time" id="createdTime">—</div>
            <div class="timeline-title">تم إنشاء الحجز</div>
          </div>
          <div class="timeline-item" id="timelineConfirm" style="display:none;">
            <div class="timeline-time">—</div>
            <div class="timeline-title">تم تأكيد الموعد</div>
          </div>
          <div class="timeline-item" id="timelineComplete" style="display:none;">
            <div class="timeline-time">—</div>
            <div class="timeline-title">اكتمل الموعد</div>
          </div>
        </div>
      </div>

    </div>

    <!-- Actions -->
    <div class="action-buttons" id="actionButtons">
      <a href="patient-dashboard.html" class="btn btn-outline">
        <i class='bx bx-arrow-back'></i> العودة
      </a>
      <button class="btn btn-primary" onclick="window.print()">
        <i class='bx bx-printer'></i> طباعة
      </button>
      <button class="btn btn-danger" onclick="cancelAppt()">
        <i class='bx bx-x'></i> إلغاء الموعد
      </button>
    </div>

  </div>

</div>

<script>
window.addEventListener('DOMContentLoaded', loadAppointment);

function loadAppointment(){
  // Get appointment ID from URL
  const urlParams = new URLSearchParams(window.location.search);
  const apptId = urlParams.get('id');
  
  if(!apptId){
    alert('لم يتم العثور على الموعد');
    window.location.href = 'patient-dashboard.html';
    return;
  }

  // Load from localStorage
  const appointments = JSON.parse(localStorage.getItem('appointments') || '[]');
  const appt = appointments.find(a => a.id === apptId);
  
  if(!appt){
    alert('لم يتم العثور على الموعد');
    window.location.href = 'patient-dashboard.html';
    return;
  }

  // Display data
  document.getElementById('apptId').textContent = 'رقم الحجز: ' + appt.id;
  document.getElementById('apptService').textContent = appt.spec || 'موعد طبي';
  
  // Status
  const isDone = appt.status === 'مكتمل';
  const isCancelled = appt.status === 'ملغي';
  const statusBadge = document.getElementById('statusBadge');
  if(isDone){
    statusBadge.innerHTML = '<i class="bx bx-check-circle"></i> مكتمل';
    statusBadge.style.background = 'rgba(16,185,129,.3)';
  } else if(isCancelled){
    statusBadge.innerHTML = '<i class="bx bx-x-circle"></i> ملغي';
    statusBadge.style.background = 'rgba(239,68,68,.3)';
  }

  // Info
  document.getElementById('apptDate').textContent = formatDate(appt.date);
  document.getElementById('apptTime').textContent = appt.time || '—';
  document.getElementById('apptSpec').textContent = appt.spec || '—';
  document.getElementById('visitType').textContent = appt.visitType || 'حضوري';
  
  const priorityEl = document.getElementById('priority');
  priorityEl.innerHTML = `<span class="priority-dot dot-${appt.priorityKey}"></span> ${appt.priority || '—'}`;
  
  const waitTimes = {normal:'~45 دقيقة', urgent:'~15 دقيقة', emergency:'فوري 🚨'};
  document.getElementById('waitTime').textContent = waitTimes[appt.priorityKey] || '—';

  // Doctor
  document.getElementById('doctorName').textContent = appt.doctor || 'لم يحدد بعد';
  document.getElementById('doctorSpec').textContent = appt.spec || '—';
  document.getElementById('doctorRating').textContent = '4.8';
  if(appt.doctor){
    document.querySelector('.doctor-avatar').textContent = appt.doctor[3];
  }

  // Symptoms
  if(appt.symptoms && appt.symptoms.length){
    document.getElementById('symptomsList').innerHTML = 
      appt.symptoms.map(s => `<span class="symptom-chip"><i class="bx bx-pulse"></i>${s}</span>`).join('');
  } else {
    document.getElementById('symptomsList').innerHTML = '<span class="symptom-chip">لا توجد أعراض مسجلة</span>';
  }
  
  document.getElementById('painLevel').textContent = appt.painLevel ? appt.painLevel + '/10' : '—';
  document.getElementById('duration').textContent = appt.duration || '—';

  // Timeline
  document.getElementById('createdTime').textContent = formatDateTime(appt.createdAt);
  
  if(isDone){
    document.getElementById('timelineConfirm').style.display = 'block';
    document.getElementById('timelineComplete').style.display = 'block';
    document.getElementById('timelineComplete').classList.add('done');
  }

  // Hide cancel button if done or cancelled
  if(isDone || isCancelled){
    document.querySelector('.btn-danger').style.display = 'none';
  }
}

function formatDate(d){
  if(!d) return '—';
  return new Date(d).toLocaleDateString('ar-SA', {
    weekday:'long', day:'numeric', month:'long', year:'numeric'
  });
}

function formatDateTime(d){
  if(!d) return '—';
  return new Date(d).toLocaleString('ar-SA', {
    day:'numeric', month:'short', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });
}

function cancelAppt(){
  if(!confirm('هل أنت متأكد من رغبتك في إلغاء هذا الموعد؟')){
    return;
  }

  const urlParams = new URLSearchParams(window.location.search);
  const apptId = urlParams.get('id');
  
  const appointments = JSON.parse(localStorage.getItem('appointments') || '[]');
  const index = appointments.findIndex(a => a.id === apptId);
  
  if(index > -1){
    appointments[index].status = 'ملغي';
    localStorage.setItem('appointments', JSON.stringify(appointments));
    alert('تم إلغاء الموعد بنجاح');
    window.location.reload();
  }
}
</script>

</body>
</html>

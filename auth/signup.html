<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب - نظام فرز المواعيد الذكي</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{font-family:'Cairo',sans-serif;box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#2563eb;--secondary:#0ea5e9;
  --success:#10b981;--danger:#ef4444;
  --dark:#0f172a;--muted:#64748b;
  --gp:linear-gradient(135deg,#2563eb,#0ea5e9);
  --gg:linear-gradient(135deg,#10b981,#059669);
}
body{
  background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:2rem 1rem;position:relative;overflow:hidden;
}
body::before,body::after{
  content:'';position:absolute;border-radius:50%;
  background:rgba(255,255,255,.1);animation:float 10s ease-in-out infinite;
}
body::before{width:450px;height:450px;top:-180px;right:-180px;}
body::after{width:380px;height:380px;bottom:-150px;left:-150px;animation-delay:4s;}
@keyframes float{0%,100%{transform:translate(0,0) rotate(0deg);}50%{transform:translate(20px,-20px) rotate(5deg);}}

.signup-container{
  max-width:520px;width:100%;position:relative;z-index:2;
  animation:slideUp .6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(40px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}

.signup-card{
  background:#fff;border-radius:28px;padding:2.8rem 2.5rem;
  box-shadow:0 25px 70px rgba(0,0,0,.25);
  position:relative;overflow:hidden;
}
.signup-card::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:5px;background:var(--gp);
}

.logo-section{text-align:center;margin-bottom:2rem;}
.logo-icon{
  width:75px;height:75px;border-radius:50%;
  background:var(--gp);display:flex;align-items:center;
  justify-content:center;font-size:2.3rem;color:#fff;
  margin:0 auto 1rem;box-shadow:0 8px 25px rgba(37,99,235,.35);
}
.logo-title{font-size:1.7rem;font-weight:900;color:var(--dark);margin-bottom:.4rem;}
.logo-subtitle{font-size:.9rem;color:var(--muted);}

/* Progress Steps */
.steps-wrap{
  display:flex;justify-content:center;align-items:center;
  margin-bottom:2rem;gap:0;
}
.step{
  display:flex;flex-direction:column;align-items:center;gap:.3rem;
}
.step-circle{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.95rem;font-weight:800;
  border:3px solid #e2e8f0;background:#fff;color:#94a3b8;
  transition:all .4s;
}
.step.active .step-circle{
  background:var(--gp);border-color:var(--primary);color:#fff;
  box-shadow:0 4px 14px rgba(37,99,235,.4);
}
.step.done .step-circle{
  background:var(--success);border-color:var(--success);color:#fff;
}
.step-label{font-size:.7rem;font-weight:700;color:#94a3b8;}
.step.active .step-label,.step.done .step-label{color:var(--dark);}
.step-line{
  width:60px;height:3px;background:#e2e8f0;
  margin-bottom:1.5rem;transition:background .4s;
}
.step-line.active{background:var(--gp);}
.step-line.done{background:var(--success);}

/* Form */
.form-step{display:none;}
.form-step.active{display:block;animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

.form-group{margin-bottom:1.3rem;}
.form-label{
  font-weight:700;color:var(--dark);font-size:.85rem;
  margin-bottom:.5rem;display:block;
}
.input-wrap{position:relative;}
.input-wrap i{
  position:absolute;top:50%;right:14px;transform:translateY(-50%);
  color:var(--muted);font-size:1.1rem;
}
.form-control,.form-select{
  width:100%;padding:.8rem 2.8rem .8rem 1rem;
  border:2px solid #e8f0fe;border-radius:12px;
  font-family:'Cairo',sans-serif;font-size:.88rem;
  transition:all .3s;background:#fafbff;
}
.form-control:focus,.form-select:focus{
  border-color:var(--primary);box-shadow:0 0 0 4px rgba(37,99,235,.1);
  outline:none;background:#fff;
}

.gender-opts{display:flex;gap:.8rem;}
.gender-opt{
  flex:1;padding:.75rem;border-radius:12px;
  border:2px solid #e8f0fe;background:#fff;
  text-align:center;cursor:pointer;transition:all .3s;
  font-weight:700;font-size:.85rem;color:var(--muted);
}
.gender-opt:hover{border-color:var(--primary);}
.gender-opt.selected{
  background:var(--gp);border-color:var(--primary);color:#fff;
  box-shadow:0 4px 12px rgba(37,99,235,.3);
}

.terms{
  display:flex;align-items:flex-start;gap:.6rem;
  font-size:.82rem;color:var(--muted);margin:1.3rem 0;
}
.terms input{margin-top:.2rem;cursor:pointer;}
.terms a{color:var(--primary);font-weight:700;text-decoration:none;}
.terms a:hover{text-decoration:underline;}

.btn-group{
  display:flex;gap:.8rem;margin-top:1.8rem;
}
.btn{
  padding:.85rem 1.8rem;border-radius:12px;border:none;
  font-weight:800;font-size:.92rem;cursor:pointer;
  transition:all .3s;display:flex;align-items:center;
  justify-content:center;gap:.5rem;
}
.btn-prev{
  background:#f1f5f9;color:var(--muted);
}
.btn-prev:hover{background:#e2e8f0;color:var(--dark);}
.btn-next{
  flex:1;background:var(--gp);color:#fff;
  box-shadow:0 6px 18px rgba(37,99,235,.3);
}
.btn-next:hover{
  transform:translateY(-3px);box-shadow:0 10px 28px rgba(37,99,235,.45);
}

.login-prompt{
  text-align:center;font-size:.88rem;color:var(--muted);margin-top:1.5rem;
}
.login-link{
  color:var(--primary);font-weight:700;text-decoration:none;
}
.login-link:hover{text-decoration:underline;}

.back-home{
  text-align:center;margin-top:1.5rem;
}
.back-home a{
  color:#fff;text-decoration:none;font-weight:700;
  font-size:.88rem;transition:all .3s;
  display:inline-flex;align-items:center;gap:.4rem;
}
.back-home a:hover{transform:translateX(-3px);}

.alert{
  padding:.85rem 1.1rem;border-radius:12px;margin-bottom:1.3rem;
  font-size:.85rem;font-weight:600;display:none;
  animation:slideIn .3s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.alert.show{display:block;}
.alert-success{background:rgba(16,185,129,.12);color:#065f46;border:2px solid rgba(16,185,129,.3);}
.alert-danger{background:rgba(239,68,68,.12);color:#991b1b;border:2px solid rgba(239,68,68,.3);}

@media(max-width:576px){
  .signup-card{padding:2.3rem 1.8rem;}
  .step-line{width:40px;}
  .btn-group{flex-direction:column;}
  .btn-prev{order:2;}
}
</style>
</head>
<body>

<div class="signup-container">
  <div class="signup-card">
    <div class="logo-section">
      <div class="logo-icon"><i class='bx bx-user-plus'></i></div>
      <h1 class="logo-title">إنشاء حساب جديد</h1>
      <p class="logo-subtitle">انضم إلى نظام فرز المواعيد الذكي</p>
    </div>

    <!-- Steps -->
    <div class="steps-wrap">
      <div class="step active" id="step1">
        <div class="step-circle">1</div>
        <span class="step-label">البيانات</span>
      </div>
      <div class="step-line" id="line1"></div>
      <div class="step" id="step2">
        <div class="step-circle">2</div>
        <span class="step-label">الحساب</span>
      </div>
      <div class="step-line" id="line2"></div>
      <div class="step" id="step3">
        <div class="step-circle">3</div>
        <span class="step-label">التأكيد</span>
      </div>
    </div>

    <div class="alert alert-danger" id="alert"></div>

    <form id="signupForm">

      <!-- Step 1: Personal Info -->
      <div class="form-step active" id="pane1">
        <div class="form-group">
          <label class="form-label">الاسم الكامل <span style="color:var(--danger)">*</span></label>
          <div class="input-wrap">
            <i class='bx bx-user'></i>
            <input type="text" class="form-control" id="fullName" placeholder="محمد أحمد العلي" required>
          </div>
        </div>

        <div class="row g-2">
          <div class="col-6">
            <div class="form-group">
              <label class="form-label">العمر <span style="color:var(--danger)">*</span></label>
              <input type="number" class="form-control" id="age" placeholder="25" min="1" max="120" required>
            </div>
          </div>
          <div class="col-6">
            <div class="form-group">
              <label class="form-label">فصيلة الدم</label>
              <select class="form-select" id="bloodType">
                <option value="">غير معروف</option>
                <option>A+</option><option>A-</option>
                <option>B+</option><option>B-</option>
                <option>O+</option><option>O-</option>
                <option>AB+</option><option>AB-</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">الجنس <span style="color:var(--danger)">*</span></label>
          <div class="gender-opts">
            <div class="gender-opt" data-gender="ذكر" onclick="selectGender(this)">
              <i class='bx bx-male-sign'></i> ذكر
            </div>
            <div class="gender-opt" data-gender="أنثى" onclick="selectGender(this)">
              <i class='bx bx-female-sign'></i> أنثى
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">رقم الجوال <span style="color:var(--danger)">*</span></label>
          <div class="input-wrap">
            <i class='bx bx-phone'></i>
            <input type="tel" class="form-control" id="phone" placeholder="05xxxxxxxx" required>
          </div>
        </div>
      </div>

      <!-- Step 2: Account -->
      <div class="form-step" id="pane2">
        <div class="form-group">
          <label class="form-label">البريد الإلكتروني <span style="color:var(--danger)">*</span></label>
          <div class="input-wrap">
            <i class='bx bx-envelope'></i>
            <input type="email" class="form-control" id="email" placeholder="example@email.com" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">كلمة المرور <span style="color:var(--danger)">*</span></label>
          <div class="input-wrap">
            <i class='bx bx-lock-alt'></i>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
          </div>
          <small style="color:var(--muted);font-size:.75rem;">يجب أن تكون 8 أحرف على الأقل</small>
        </div>

        <div class="form-group">
          <label class="form-label">تأكيد كلمة المرور <span style="color:var(--danger)">*</span></label>
          <div class="input-wrap">
            <i class='bx bx-lock-alt'></i>
            <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••" required>
          </div>
        </div>
      </div>

      <!-- Step 3: Confirmation -->
      <div class="form-step" id="pane3">
        <div style="text-align:center;margin-bottom:1.5rem;">
          <div style="width:70px;height:70px;border-radius:50%;background:rgba(16,185,129,.12);
                      display:flex;align-items:center;justify-content:center;
                      margin:0 auto 1rem;font-size:2.5rem;color:var(--success);">
            <i class='bx bx-check-circle'></i>
          </div>
          <h3 style="font-weight:800;color:var(--dark);font-size:1.3rem;margin-bottom:.5rem;">
            تأكيد البيانات
          </h3>
          <p style="color:var(--muted);font-size:.88rem;">
            يرجى مراجعة بياناتك قبل إنشاء الحساب
          </p>
        </div>

        <div style="background:#f8fafc;border-radius:16px;padding:1.3rem;">
          <div style="display:grid;gap:.8rem;">
            <div style="display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid #e8f0fe;">
              <span style="font-size:.82rem;color:var(--muted);font-weight:600;">الاسم</span>
              <span style="font-size:.85rem;font-weight:800;color:var(--dark);" id="summaryName">—</span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid #e8f0fe;">
              <span style="font-size:.82rem;color:var(--muted);font-weight:600;">العمر / الجنس</span>
              <span style="font-size:.85rem;font-weight:800;color:var(--dark);" id="summaryAge">—</span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid #e8f0fe;">
              <span style="font-size:.82rem;color:var(--muted);font-weight:600;">الجوال</span>
              <span style="font-size:.85rem;font-weight:800;color:var(--dark);" id="summaryPhone">—</span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:.5rem 0;">
              <span style="font-size:.82rem;color:var(--muted);font-weight:600;">البريد</span>
              <span style="font-size:.85rem;font-weight:800;color:var(--dark);" id="summaryEmail">—</span>
            </div>
          </div>
        </div>

        <div class="terms">
          <input type="checkbox" id="termsCheck" required>
          <label for="termsCheck">
            أوافق على <a href="#">شروط الخدمة</a> و <a href="#">سياسة الخصوصية</a>
          </label>
        </div>
      </div>

      <!-- Buttons -->
      <div class="btn-group">
        <button type="button" class="btn btn-prev" id="prevBtn" onclick="prevStep()" style="display:none;">
          <i class='bx bx-chevron-right'></i> السابق
        </button>
        <button type="button" class="btn btn-next" id="nextBtn" onclick="nextStep()">
          التالي <i class='bx bx-chevron-left'></i>
        </button>
      </div>
    </form>

    <p class="login-prompt">
      لديك حساب بالفعل؟ <a href="login.html" class="login-link">تسجيل الدخول</a>
    </p>
  </div>

  <div class="back-home">
    <a href="index.html">
      <i class='bx bx-arrow-back'></i>
      العودة للصفحة الرئيسية
    </a>
  </div>
</div>

<script>
let currentStep = 1;
let selectedGender = '';

function selectGender(el){
  document.querySelectorAll('.gender-opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  selectedGender = el.dataset.gender;
}

function nextStep(){
  if(!validateStep(currentStep)) return;
  
  if(currentStep < 3){
    document.getElementById('pane'+currentStep).classList.remove('active');
    currentStep++;
    document.getElementById('pane'+currentStep).classList.add('active');
    updateSteps();
    
    if(currentStep === 3) updateSummary();
  } else {
    submitForm();
  }
}

function prevStep(){
  if(currentStep > 1){
    document.getElementById('pane'+currentStep).classList.remove('active');
    currentStep--;
    document.getElementById('pane'+currentStep).classList.add('active');
    updateSteps();
  }
}

function updateSteps(){
  for(let i=1; i<=3; i++){
    const step = document.getElementById('step'+i);
    const line = document.getElementById('line'+i);
    
    step.classList.remove('active','done');
    if(i < currentStep) step.classList.add('done');
    else if(i === currentStep) step.classList.add('active');
    
    if(line){
      line.classList.remove('active','done');
      if(i < currentStep) line.classList.add('done');
      else if(i === currentStep) line.classList.add('active');
    }
  }
  
  document.getElementById('prevBtn').style.display = currentStep === 1 ? 'none' : 'flex';
  document.getElementById('nextBtn').innerHTML = currentStep === 3 
    ? '<i class="bx bx-check"></i> إنشاء الحساب'
    : 'التالي <i class="bx bx-chevron-left"></i>';
}

function validateStep(step){
  if(step === 1){
    const name = document.getElementById('fullName').value.trim();
    const age = document.getElementById('age').value;
    const phone = document.getElementById('phone').value.trim();
    
    if(!name){showAlert('يرجى إدخال الاسم الكامل','danger'); return false;}
    if(!age || age < 1){showAlert('يرجى إدخال العمر','danger'); return false;}
    if(!selectedGender){showAlert('يرجى اختيار الجنس','danger'); return false;}
    if(!phone || phone.length < 10){showAlert('يرجى إدخال رقم جوال صحيح','danger'); return false;}
  }
  
  if(step === 2){
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    
    if(!email || !email.includes('@')){showAlert('يرجى إدخال بريد إلكتروني صحيح','danger'); return false;}
    if(pass.length < 8){showAlert('كلمة المرور يجب أن تكون 8 أحرف على الأقل','danger'); return false;}
    if(pass !== confirm){showAlert('كلمتا المرور غير متطابقتين','danger'); return false;}
  }
  
  if(step === 3){
    if(!document.getElementById('termsCheck').checked){
      showAlert('يجب الموافقة على الشروط والأحكام','danger');
      return false;
    }
  }
  
  return true;
}

function updateSummary(){
  document.getElementById('summaryName').textContent = document.getElementById('fullName').value;
  document.getElementById('summaryAge').textContent = 
    document.getElementById('age').value + ' سنة / ' + selectedGender;
  document.getElementById('summaryPhone').textContent = document.getElementById('phone').value;
  document.getElementById('summaryEmail').textContent = document.getElementById('email').value;
}

function submitForm(){
  showAlert('جاري إنشاء الحساب...', 'success');
  
  // Simulate account creation
  setTimeout(()=>{
    showAlert('تم إنشاء الحساب بنجاح! جاري التحويل...', 'success');
    setTimeout(()=>window.location.href='login.html', 1500);
  }, 1500);
}

function showAlert(msg, type){
  const alert = document.getElementById('alert');
  alert.textContent = msg;
  alert.className = `alert alert-${type} show`;
  setTimeout(()=>alert.classList.remove('show'), 4000);
}
</script>
</body>
</html>

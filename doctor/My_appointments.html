<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مواعيدي — شفاء+</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/shared-dashboard.css">
    <link rel="stylesheet" href="../assets/css/admin-dashboard.css">
    <link rel="stylesheet" href="../assets/css/doctor-dashboard.css">
    <style>
        /* Page header */
        .page-hero {
            background: var(--doc-gp);
            border-radius: 24px;
            padding: 2rem 2.5rem;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 55px var(--doc-shadow);
        }

        .page-hero::before {
            content: '';
            position: absolute;
            top: -80px;
            left: -80px;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .06);
        }

        .page-hero-inner {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-hero h1 {
            font-size: 1.7rem;
            font-weight: 900;
            color: #fff;
            display: flex;
            align-items: center;
            gap: .6rem;
        }

        .page-hero p {
            color: rgba(255, 255, 255, .8);
            font-size: .9rem;
            margin-top: .3rem;
            font-weight: 600;
        }

        /* Stats row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-mini {
            background: #fff;
            border-radius: 18px;
            padding: 1.2rem 1.5rem;
            border: 1.5px solid var(--doc-border);
            box-shadow: 0 4px 16px rgba(15, 23, 42, .04);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .stat-mini-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .stat-mini-num {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--doc-dark);
            line-height: 1;
        }

        .stat-mini-lbl {
            font-size: .78rem;
            color: var(--doc-muted);
            font-weight: 700;
            margin-top: .2rem;
        }

        /* Controls */
        .controls-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            display: flex;
            align-items: center;
            gap: .6rem;
            background: #fff;
            border-radius: 14px;
            padding: .7rem 1.1rem;
            border: 1.5px solid var(--doc-border);
            box-shadow: 0 2px 8px rgba(15, 23, 42, .04);
        }

        .search-box i {
            color: var(--doc-muted);
            font-size: 1.1rem;
        }

        .search-box input {
            border: none;
            outline: none;
            font-family: 'Cairo', sans-serif;
            font-size: .9rem;
            width: 100%;
            background: transparent;
            color: var(--doc-dark);
        }

        .filter-tabs {
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
        }

        .ft {
            padding: .5rem 1.1rem;
            border-radius: 50px;
            font-family: 'Cairo', sans-serif;
            font-size: .82rem;
            font-weight: 800;
            cursor: pointer;
            border: 1.5px solid var(--doc-border);
            background: #f8fafc;
            color: var(--doc-muted);
            transition: var(--doc-transition);
        }

        .ft:hover {
            border-color: var(--doc-primary);
            color: var(--doc-primary);
        }

        .ft.active {
            background: var(--doc-gp);
            color: #fff;
            border-color: var(--doc-primary);
        }

        /* Appointment cards */
        .appt-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .appt-card {
            background: #fff;
            border-radius: 20px;
            padding: 1.3rem 1.6rem;
            border: 1.5px solid var(--doc-border);
            box-shadow: 0 4px 16px rgba(15, 23, 42, .04);
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            transition: var(--doc-transition);
            cursor: pointer;
        }

        .appt-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(15, 23, 42, .1);
            border-color: var(--doc-primary);
        }

        .appt-card.emergency {
            border-right: 4px solid #ef4444;
        }

        .appt-card.urgent {
            border-right: 4px solid #f59e0b;
        }

        .appt-card.normal {
            border-right: 4px solid #10b981;
        }

        /* Time column */
        .appt-time {
            text-align: center;
            min-width: 60px;
            flex-shrink: 0;
            background: var(--doc-primary-l);
            border-radius: 12px;
            padding: .6rem;
        }

        .appt-time-val {
            font-size: 1rem;
            font-weight: 900;
            color: var(--doc-primary);
        }

        .appt-time-date {
            font-size: .7rem;
            color: var(--doc-muted);
            font-weight: 700;
            margin-top: .2rem;
        }

        /* Avatar */
        .appt-av {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--doc-gp);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 900;
            color: #fff;
            flex-shrink: 0;
        }

        /* Info */
        .appt-info {
            flex: 1;
            min-width: 160px;
        }

        .appt-name {
            font-size: 1rem;
            font-weight: 900;
            color: var(--doc-dark);
        }

        .appt-meta {
            font-size: .8rem;
            color: var(--doc-muted);
            font-weight: 700;
            margin-top: .25rem;
            display: flex;
            gap: .8rem;
            flex-wrap: wrap;
        }

        .appt-meta span {
            display: flex;
            align-items: center;
            gap: .3rem;
        }

        /* Status badge */
        .status-badge {
            padding: .35rem .9rem;
            border-radius: 50px;
            font-size: .75rem;
            font-weight: 800;
            white-space: nowrap;
        }

        .sb-wait {
            background: rgba(245, 158, 11, .1);
            color: #d97706;
        }

        .sb-done {
            background: rgba(16, 185, 129, .1);
            color: #059669;
        }

        .sb-cancel {
            background: rgba(239, 68, 68, .1);
            color: #dc2626;
        }

        .sb-trans {
            background: rgba(99, 102, 241, .1);
            color: #4f46e5;
        }

        /* Quick actions */
        .appt-actions {
            display: flex;
            gap: .5rem;
        }

        .qa-btn {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            border: 1.5px solid var(--doc-border);
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            color: var(--doc-muted);
            transition: var(--doc-transition);
        }

        .qa-btn:hover {
            background: var(--doc-primary-l);
            color: var(--doc-primary);
            border-color: var(--doc-primary);
        }

        .qa-btn.danger:hover {
            background: rgba(239, 68, 68, .1);
            color: #ef4444;
            border-color: #ef4444;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--doc-muted);
        }

        .empty-state i {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            opacity: .4;
            display: block;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .stats-row {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 600px) {
            .stats-row {
                grid-template-columns: 1fr 1fr;
            }

            .appt-card {
                padding: 1rem;
                gap: .8rem;
            }

            .page-hero h1 {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 400px) {
            .stats-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <button class="icon-btn mobile-toggle" id="mobileToggle"><i class='bx bx-menu'></i></button>
                <div class="brand-icon"><i class='bx bx-plus-medical'></i></div>
                <div class="brand-text">شفاء<span>+</span></div>
            </div>
            <div class="nav-actions">
                <button class="icon-btn notif-btn"><i class='bx bx-bell'></i><span class="badge">2</span></button>
                <div class="user-menu">
                    <div class="user-avatar">
                        <img src="https://ui-avatars.com/api/?name=عبدالعزيز+الصالح&background=0d9488&color=fff&font-family=Cairo"
                            alt="">
                    </div>
                    <div class="user-info">
                        <span class="user-greeting">مرحباً دكتور،</span>
                        <span class="user-name">عبدالعزيز الصالح</span>
                    </div>
                    <i class='bx bx-chevron-down dropdown-icon'></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-menu">
            <a href="Doctor_dashboard.html" class="menu-item"><i class='bx bxs-dashboard'></i><span>الرئيسية</span></a>
            <a href="My_appointments.html" class="menu-item active"><i
                    class='bx bx-calendar-check'></i><span>مواعيدي</span></a>
            <a href="My_patients.html" class="menu-item"><i class='bx bx-group'></i><span>المرضى</span></a>
            <a href="Doctor_reports.html" class="menu-item"><i class='bx bx-file-blank'></i><span>التقارير</span></a>
            <a href="Doctor_profile.html" class="menu-item"><i class='bx bx-user-circle'></i><span>ملفي
                    الشخصي</span></a>
        </div>
        <div class="sidebar-bottom">
            <a href="../public/index.html" class="menu-item logout"><i class='bx bx-log-out'></i><span>تسجيل
                    الخروج</span></a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <!-- Hero -->
        <div class="page-hero">
            <div class="page-hero-inner">
                <div>
                    <h1><i class='bx bx-calendar-alt'></i> مواعيدي</h1>
                    <p id="todayDateStr">جميع مواعيدك في مكان واحد</p>
                </div>
                <div style="display:flex;gap:.7rem;align-items:center;">
                    <input type="date" id="dateFilter" onchange="applyFilters()"
                        style="padding:.6rem 1rem;border-radius:12px;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.2);color:#fff;font-family:'Cairo',sans-serif;font-weight:700;outline:none;">
                    <button onclick="clearDateFilter()"
                        style="padding:.6rem 1rem;border-radius:12px;border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;font-weight:800;cursor:pointer;font-family:'Cairo',sans-serif;">
                        <i class='bx bx-reset'></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-mini">
                <div class="stat-mini-icon" style="background:var(--doc-primary-l);color:var(--doc-primary);"><i
                        class='bx bx-calendar'></i></div>
                <div>
                    <div class="stat-mini-num" id="statTotal">0</div>
                    <div class="stat-mini-lbl">إجمالي المواعيد</div>
                </div>
            </div>
            <div class="stat-mini">
                <div class="stat-mini-icon" style="background:rgba(245,158,11,.12);color:#d97706;"><i
                        class='bx bx-time'></i></div>
                <div>
                    <div class="stat-mini-num" id="statWaiting">0</div>
                    <div class="stat-mini-lbl">قيد الانتظار</div>
                </div>
            </div>
            <div class="stat-mini">
                <div class="stat-mini-icon" style="background:rgba(16,185,129,.12);color:#059669;"><i
                        class='bx bx-check-circle'></i></div>
                <div>
                    <div class="stat-mini-num" id="statDone">0</div>
                    <div class="stat-mini-lbl">مكتملة</div>
                </div>
            </div>
            <div class="stat-mini">
                <div class="stat-mini-icon" style="background:rgba(239,68,68,.1);color:#dc2626;"><i
                        class='bx bxs-error-circle'></i></div>
                <div>
                    <div class="stat-mini-num" id="statEmergency">0</div>
                    <div class="stat-mini-lbl">حالات حرجة</div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-bar">
            <div class="search-box">
                <i class='bx bx-search'></i>
                <input type="text" id="searchInput" placeholder="ابحث باسم المريض أو رقم الحجز..."
                    oninput="applyFilters()">
            </div>
            <div class="filter-tabs">
                <button class="ft active" onclick="setTab('all',this)">الكل</button>
                <button class="ft" onclick="setTab('today',this)">اليوم</button>
                <button class="ft" onclick="setTab('upcoming',this)">القادمة</button>
                <button class="ft" onclick="setTab('done',this)">مكتملة</button>
                <button class="ft" onclick="setTab('cancelled',this)">ملغية</button>
            </div>
        </div>

        <!-- List -->
        <div class="appt-list" id="apptList">
            <div class="empty-state"><i class='bx bx-calendar-x'></i>لا توجد مواعيد مطابقة</div>
        </div>

    </main>

    <script>
        let allAppts = [], currentTab = 'all';

        const DEMO = [
            { id: 'APT-2024-0071', name: 'محمد عبدالله العتيبي', age: 47, gender: 'ذكر', date: today(0), time: '08:30', spec: 'طب باطني', priorityKey: 'emergency', priority: 'حرجة', status: 'قيد الانتظار', phone: '0501234567' },
            { id: 'APT-2024-0072', name: 'سارة خالد الأحمدي', age: 32, gender: 'أنثى', date: today(0), time: '09:00', spec: 'طب باطني', priorityKey: 'urgent', priority: 'عاجلة', status: 'قيد الانتظار', phone: '0509876543' },
            { id: 'APT-2024-0073', name: 'أحمد فهد الدوسري', age: 55, gender: 'ذكر', date: today(0), time: '10:30', spec: 'طب باطني', priorityKey: 'normal', priority: 'مستقرة', status: 'مكتمل', phone: '0505555555' },
            { id: 'APT-2024-0074', name: 'نورة سعد القحطاني', age: 28, gender: 'أنثى', date: today(1), time: '08:00', spec: 'طب باطني', priorityKey: 'normal', priority: 'مستقرة', status: 'قيد الانتظار', phone: '0504444444' },
            { id: 'APT-2024-0075', name: 'عبدالرحمن ماجد', age: 40, gender: 'ذكر', date: today(1), time: '11:00', spec: 'طب باطني', priorityKey: 'urgent', priority: 'عاجلة', status: 'قيد الانتظار', phone: '0503333333' },
            { id: 'APT-2024-0076', name: 'لطيفة عمر الزهراني', age: 62, gender: 'أنثى', date: today(-1), time: '09:30', spec: 'طب باطني', priorityKey: 'normal', priority: 'مستقرة', status: 'ملغي', phone: '0502222222' },
            { id: 'APT-2024-0077', name: 'فيصل نايف الشمري', age: 35, gender: 'ذكر', date: today(-1), time: '14:00', spec: 'طب باطني', priorityKey: 'normal', priority: 'مستقرة', status: 'مكتمل', phone: '0501111111' },
            { id: 'APT-2024-0078', name: 'ريم عبدالله السلمي', age: 24, gender: 'أنثى', date: today(2), time: '10:00', spec: 'طب باطني', priorityKey: 'urgent', priority: 'عاجلة', status: 'قيد الانتظار', phone: '0508888888' },
        ];

        function today(offset = 0) {
            const d = new Date();
            d.setDate(d.getDate() + offset);
            return d.toISOString().split('T')[0];
        }

        document.addEventListener('DOMContentLoaded', () => {
            initSidebar();
            document.getElementById('todayDateStr').textContent =
                new Date().toLocaleDateString('ar-SA', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

            // Merge demo + localStorage
            const stored = JSON.parse(localStorage.getItem('appointments') || '[]');
            allAppts = [...DEMO, ...stored.filter(a => !DEMO.find(d => d.id === a.id))];
            updateStats();
            applyFilters();
        });

        function updateStats() {
            document.getElementById('statTotal').textContent = allAppts.length;
            document.getElementById('statWaiting').textContent = allAppts.filter(a => a.status === 'قيد الانتظار').length;
            document.getElementById('statDone').textContent = allAppts.filter(a => a.status === 'مكتمل').length;
            document.getElementById('statEmergency').textContent = allAppts.filter(a => a.priorityKey === 'emergency').length;
        }

        function setTab(tab, el) {
            currentTab = tab;
            document.querySelectorAll('.ft').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const q = document.getElementById('searchInput').value.trim().toLowerCase();
            const dateVal = document.getElementById('dateFilter').value;
            const todayStr = today();

            let list = allAppts.slice();

            if (currentTab === 'today') list = list.filter(a => a.date === todayStr);
            if (currentTab === 'upcoming') list = list.filter(a => a.date > todayStr && a.status !== 'ملغي');
            if (currentTab === 'done') list = list.filter(a => a.status === 'مكتمل');
            if (currentTab === 'cancelled') list = list.filter(a => a.status === 'ملغي');
            if (dateVal) list = list.filter(a => a.date === dateVal);
            if (q) list = list.filter(a => a.name?.toLowerCase().includes(q) || a.id?.toLowerCase().includes(q));

            // Sort by date desc then time
            list.sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time));

            renderList(list);
        }

        function clearDateFilter() {
            document.getElementById('dateFilter').value = '';
            applyFilters();
        }

        function renderList(list) {
            const el = document.getElementById('apptList');
            if (!list.length) {
                el.innerHTML = '<div class="empty-state"><i class=\'bx bx-calendar-x\'></i>لا توجد مواعيد مطابقة</div>';
                return;
            }

            const priCls = { emergency: 'emergency', urgent: 'urgent', normal: 'normal' };
            const priColor = { emergency: '#ef4444', urgent: '#f59e0b', normal: '#10b981' };

            el.innerHTML = list.map(a => {
                const statusClass = a.status === 'مكتمل' ? 'sb-done' : a.status === 'ملغي' ? 'sb-cancel' : a.status === 'محول' ? 'sb-trans' : 'sb-wait';
                const initials = a.name?.split(' ').map(w => w[0]).slice(0, 2).join('') || '—';
                const fmtDate = a.date ? new Date(a.date).toLocaleDateString('ar-SA', { day: 'numeric', month: 'short' }) : '—';
                return `
        <div class="appt-card ${priCls[a.priorityKey] || ''}" onclick="openAppt('${a.id}')">
          <div class="appt-time">
            <div class="appt-time-val">${a.time || '—'}</div>
            <div class="appt-time-date">${fmtDate}</div>
          </div>
          <div class="appt-av">${initials}</div>
          <div class="appt-info">
            <div class="appt-name">${a.name || '—'}</div>
            <div class="appt-meta">
              <span><i class='bx bx-id-card'></i>${a.id}</span>
              <span><i class='bx bx-user'></i>${a.age || '—'} سنة · ${a.gender || '—'}</span>
              <span style="color:${priColor[a.priorityKey] || 'inherit'}">
                <i class='bx bx-flag'></i>${a.priority || '—'}
              </span>
            </div>
          </div>
          <span class="status-badge ${statusClass}">${a.status}</span>
          <div class="appt-actions" onclick="event.stopPropagation()">
            <button class="qa-btn" title="التفاصيل" onclick="openAppt('${a.id}')"><i class='bx bx-show'></i></button>
            <button class="qa-btn" title="اتصال"><i class='bx bx-phone'></i></button>
            <button class="qa-btn danger" title="إلغاء" onclick="cancelAppt('${a.id}',this)"><i class='bx bx-x-circle'></i></button>
          </div>
        </div>`;
            }).join('');
        }

        function openAppt(id) {
            window.location.href = 'Appointment_details.html?id=' + id;
        }

        function cancelAppt(id, btn) {
            if (!confirm('إلغاء هذا الموعد؟')) return;
            const idx = allAppts.findIndex(a => a.id === id);
            if (idx > -1) allAppts[idx].status = 'ملغي';
            // update localStorage
            const stored = JSON.parse(localStorage.getItem('appointments') || '[]');
            const sIdx = stored.findIndex(a => a.id === id);
            if (sIdx > -1) { stored[sIdx].status = 'ملغي'; localStorage.setItem('appointments', JSON.stringify(stored)); }
            updateStats(); applyFilters();
        }

        function initSidebar() {
            const toggle = document.getElementById('mobileToggle');
            const sidebar = document.getElementById('sidebar');
            toggle.addEventListener('click', () => {
                sidebar.classList.toggle('active');
                document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
            });
            document.addEventListener('click', e => {
                if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !toggle.contains(e.target) && sidebar.classList.contains('active')) {
                    sidebar.classList.remove('active'); document.body.style.overflow = '';
                }
            });
        }
    </script>
</body>

</html>

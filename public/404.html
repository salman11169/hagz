<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة غير موجودة - 404</title>
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{font-family:'Cairo',sans-serif;box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#2563eb;--secondary:#0ea5e9;
  --gp:linear-gradient(135deg,#2563eb,#0ea5e9);
}
body{
  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  min-height:100vh;display:flex;align-items:center;
  justify-content:center;padding:2rem 1rem;
  position:relative;overflow:hidden;
}
body::before,body::after{
  content:'';position:absolute;border-radius:50%;
  background:rgba(255,255,255,.06);animation:float 10s ease-in-out infinite;
}
body::before{width:500px;height:500px;top:-200px;left:-200px;}
body::after{width:400px;height:400px;bottom:-150px;right:-150px;animation-delay:5s;}
@keyframes float{0%,100%{transform:translate(0,0) rotate(0deg);}50%{transform:translate(20px,-20px) rotate(5deg);}}

.error-container{
  text-align:center;position:relative;z-index:2;max-width:600px;
  animation:slideUp .8s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(50px);}to{opacity:1;transform:translateY(0);}}

.error-icon{
  font-size:12rem;color:rgba(255,255,255,.3);
  line-height:1;margin-bottom:1rem;
  animation:bounce 2s ease-in-out infinite;
}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}

.error-code{
  font-size:8rem;font-weight:900;
  background:linear-gradient(135deg,#fff,rgba(255,255,255,.7));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;line-height:1;margin-bottom:1rem;
  text-shadow:0 10px 30px rgba(0,0,0,.2);
}

.error-title{
  color:#fff;font-size:2.5rem;font-weight:900;
  margin-bottom:1rem;text-shadow:0 4px 15px rgba(0,0,0,.2);
}

.error-message{
  color:rgba(255,255,255,.85);font-size:1.15rem;
  margin-bottom:2.5rem;line-height:1.7;
}

.btn-group{
  display:flex;gap:1rem;justify-content:center;
  flex-wrap:wrap;margin-bottom:2rem;
}
.btn{
  padding:.9rem 2.2rem;border-radius:50px;border:none;
  font-weight:800;font-size:1rem;cursor:pointer;
  transition:all .3s;display:inline-flex;
  align-items:center;gap:.6rem;text-decoration:none;
  font-family:'Cairo',sans-serif;
}
.btn-primary{
  background:#fff;color:var(--primary);
  box-shadow:0 8px 25px rgba(0,0,0,.2);
}
.btn-primary:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 35px rgba(0,0,0,.3);
}
.btn-outline{
  background:rgba(255,255,255,.15);color:#fff;
  border:2px solid rgba(255,255,255,.4);
  backdrop-filter:blur(10px);
}
.btn-outline:hover{
  background:rgba(255,255,255,.25);
  transform:translateY(-4px);
}

.suggestions{
  background:rgba(255,255,255,.1);
  border-radius:20px;padding:2rem;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.2);
}
.suggestions h3{
  color:#fff;font-size:1.3rem;font-weight:800;
  margin-bottom:1.2rem;
}
.suggestions-list{
  display:grid;gap:.8rem;text-align:right;
}
.suggestion-item{
  background:rgba(255,255,255,.1);
  border-radius:12px;padding:1rem 1.3rem;
  display:flex;align-items:center;gap:1rem;
  transition:all .3s;
  text-decoration:none;color:#fff;
  border:1px solid rgba(255,255,255,.1);
}
.suggestion-item:hover{
  background:rgba(255,255,255,.2);
  transform:translateX(-5px);
  border-color:rgba(255,255,255,.3);
}
.suggestion-icon{
  width:45px;height:45px;border-radius:12px;
  background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;flex-shrink:0;
}
.suggestion-text{
  font-weight:600;font-size:.95rem;
}

@media(max-width:768px){
  .error-code{font-size:5rem;}
  .error-title{font-size:2rem;}
  .error-icon{font-size:8rem;}
  .btn-group{flex-direction:column;}
  .suggestions{padding:1.5rem;}
}
</style>
</head>
<body>

<div class="error-container">
  <div class="error-icon">
    <i class='bx bx-search-alt'></i>
  </div>
  
  <div class="error-code">404</div>
  
  <h1 class="error-title">عذراً، الصفحة غير موجودة!</h1>
  
  <p class="error-message">
    يبدو أن الصفحة التي تبحث عنها قد تم نقلها أو حذفها أو أنها غير موجودة من الأساس.
    لا تقلق، يمكنك العودة للصفحة الرئيسية أو تصفح الروابط المفيدة أدناه.
  </p>

  <div class="btn-group">
    <a href="index.html" class="btn btn-primary">
      <i class='bx bx-home'></i>
      العودة للرئيسية
    </a>
    <a href="booking.html" class="btn btn-outline">
      <i class='bx bx-calendar-plus'></i>
      حجز موعد
    </a>
  </div>

  <div class="suggestions">
    <h3>روابط مفيدة قد تهمك:</h3>
    <div class="suggestions-list">
      <a href="about.html" class="suggestion-item">
        <div class="suggestion-icon">
          <i class='bx bx-info-circle'></i>
        </div>
        <span class="suggestion-text">من نحن</span>
      </a>
      <a href="contact.html" class="suggestion-item">
        <div class="suggestion-icon">
          <i class='bx bx-envelope'></i>
        </div>
        <span class="suggestion-text">اتصل بنا</span>
      </a>
      <a href="faq.html" class="suggestion-item">
        <div class="suggestion-icon">
          <i class='bx bx-help-circle'></i>
        </div>
        <span class="suggestion-text">الأسئلة الشائعة</span>
      </a>
      <a href="login.html" class="suggestion-item">
        <div class="suggestion-icon">
          <i class='bx bx-log-in'></i>
        </div>
        <span class="suggestion-text">تسجيل الدخول</span>
      </a>
    </div>
  </div>
</div>

</body>
</html>

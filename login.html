<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - نظام فرز المواعيد الذكي</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{font-family:'Cairo',sans-serif;box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#2563eb;--secondary:#0ea5e9;
  --success:#10b981;--danger:#ef4444;
  --dark:#0f172a;--muted:#64748b;
  --gp:linear-gradient(135deg,#2563eb,#0ea5e9);
  --g1:linear-gradient(135deg,#667eea,#764ba2);
}
body{
  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:2rem 1rem;position:relative;overflow:hidden;
}
body::before,body::after{
  content:'';position:absolute;border-radius:50%;
  background:rgba(255,255,255,.08);animation:float 8s ease-in-out infinite;
}
body::before{width:400px;height:400px;top:-150px;left:-150px;}
body::after{width:350px;height:350px;bottom:-130px;right:-130px;animation-delay:3s;}
@keyframes float{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(15px,-15px) scale(1.05);}}

.login-container{
  max-width:440px;width:100%;position:relative;z-index:2;
  animation:slideUp .6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}

.login-card{
  background:#fff;border-radius:28px;padding:3rem 2.5rem;
  box-shadow:0 25px 70px rgba(0,0,0,.3);
  position:relative;overflow:hidden;
}
.login-card::before{
  content:'';position:absolute;top:0;left:0;right:0;
  height:5px;background:var(--gp);
}

.logo-section{text-align:center;margin-bottom:2.5rem;}
.logo-icon{
  width:80px;height:80px;border-radius:50%;
  background:var(--gp);display:flex;align-items:center;
  justify-content:center;font-size:2.5rem;color:#fff;
  margin:0 auto 1.2rem;box-shadow:0 8px 25px rgba(37,99,235,.35);
}
.logo-title{font-size:1.8rem;font-weight:900;color:var(--dark);margin-bottom:.5rem;}
.logo-subtitle{font-size:.95rem;color:var(--muted);}

.role-tabs{
  display:flex;gap:.8rem;margin-bottom:2rem;
}
.role-tab{
  flex:1;padding:.85rem;border-radius:14px;
  border:2px solid #e8f0fe;background:#fff;
  text-align:center;cursor:pointer;transition:all .3s;
  font-weight:700;font-size:.9rem;color:var(--muted);
}
.role-tab:hover{border-color:var(--primary);}
.role-tab.active{
  background:var(--gp);border-color:var(--primary);color:#fff;
  box-shadow:0 6px 18px rgba(37,99,235,.3);
}

.form-group{margin-bottom:1.5rem;}
.form-label{
  font-weight:700;color:var(--dark);font-size:.88rem;
  margin-bottom:.5rem;display:block;
}
.input-wrap{position:relative;}
.input-wrap i{
  position:absolute;top:50%;right:16px;transform:translateY(-50%);
  color:var(--muted);font-size:1.2rem;
}
.form-control{
  width:100%;padding:.85rem 3rem .85rem 1rem;
  border:2px solid #e8f0fe;border-radius:14px;
  font-family:'Cairo',sans-serif;font-size:.92rem;
  transition:all .3s;background:#fafbff;
}
.form-control:focus{
  border-color:var(--primary);box-shadow:0 0 0 4px rgba(37,99,235,.1);
  outline:none;background:#fff;
}
.form-control::placeholder{color:#b0bec5;}

.password-toggle{
  position:absolute;left:16px;top:50%;transform:translateY(-50%);
  cursor:pointer;color:var(--muted);font-size:1.2rem;
  transition:color .3s;
}
.password-toggle:hover{color:var(--primary);}

.form-options{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:1.8rem;flex-wrap:wrap;gap:.8rem;
}
.remember-me{
  display:flex;align-items:center;gap:.5rem;
  cursor:pointer;font-size:.85rem;color:var(--muted);font-weight:600;
}
.remember-me input{cursor:pointer;}
.forgot-link{
  font-size:.85rem;color:var(--primary);font-weight:700;
  text-decoration:none;transition:all .3s;
}
.forgot-link:hover{color:var(--secondary);text-decoration:underline;}

.btn-login{
  width:100%;padding:1rem;border-radius:14px;border:none;
  background:var(--gp);color:#fff;font-weight:800;
  font-size:1.05rem;cursor:pointer;transition:all .3s;
  box-shadow:0 6px 20px rgba(37,99,235,.3);
  display:flex;align-items:center;justify-content:center;gap:.6rem;
}
.btn-login:hover{
  transform:translateY(-3px);box-shadow:0 10px 30px rgba(37,99,235,.45);
}

.divider{
  display:flex;align-items:center;gap:1rem;
  margin:1.8rem 0;color:var(--muted);font-size:.85rem;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;background:#e8f0fe;
}

.signup-prompt{
  text-align:center;font-size:.9rem;color:var(--muted);
}
.signup-link{
  color:var(--primary);font-weight:700;text-decoration:none;
  transition:all .3s;
}
.signup-link:hover{color:var(--secondary);text-decoration:underline;}

.back-home{
  text-align:center;margin-top:1.5rem;
}
.back-home a{
  color:#fff;text-decoration:none;font-weight:700;
  font-size:.9rem;transition:all .3s;
  display:inline-flex;align-items:center;gap:.4rem;
}
.back-home a:hover{transform:translateX(-3px);}

.alert{
  padding:.9rem 1.2rem;border-radius:12px;margin-bottom:1.5rem;
  font-size:.88rem;font-weight:600;display:none;
  animation:slideIn .3s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.alert.show{display:block;}
.alert-success{background:rgba(16,185,129,.12);color:#065f46;border:2px solid rgba(16,185,129,.3);}
.alert-danger{background:rgba(239,68,68,.12);color:#991b1b;border:2px solid rgba(239,68,68,.3);}

@media(max-width:480px){
  .login-card{padding:2.5rem 1.8rem;}
  .logo-title{font-size:1.5rem;}
}
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="logo-section">
      <div class="logo-icon"><i class='bx bx-health'></i></div>
      <h1 class="logo-title">تسجيل الدخول</h1>
      <p class="logo-subtitle">مرحباً بعودتك إلى نظام فرز المواعيد الذكي</p>
    </div>

    <div class="role-tabs">
      <div class="role-tab active" data-role="patient" onclick="switchRole(this)">
        <i class='bx bx-user'></i> مريض
      </div>
      <div class="role-tab" data-role="doctor" onclick="switchRole(this)">
        <i class='bx bx-user-pin'></i> طبيب
      </div>
      <div class="role-tab" data-role="admin" onclick="switchRole(this)">
        <i class='bx bx-shield'></i> إدارة
      </div>
    </div>

    <div class="alert alert-danger" id="alert"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">رقم الجوال أو البريد الإلكتروني</label>
        <div class="input-wrap">
          <i class='bx bx-user'></i>
          <input type="text" class="form-control" id="username" 
                 placeholder="05xxxxxxxx أو email@example.com" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <div class="input-wrap">
          <i class='bx bx-lock-alt'></i>
          <input type="password" class="form-control" id="password" 
                 placeholder="••••••••" required>
          <i class='bx bx-hide password-toggle' id="togglePassword" onclick="togglePassword()"></i>
        </div>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" id="remember">
          <span>تذكرني</span>
        </label>
        <a href="#" class="forgot-link">نسيت كلمة المرور؟</a>
      </div>

      <button type="submit" class="btn-login">
        <i class='bx bx-log-in-circle'></i>
        <span>تسجيل الدخول</span>
      </button>
    </form>

    <div class="divider">أو</div>

    <p class="signup-prompt">
      ليس لديك حساب؟ <a href="signup.html" class="signup-link">إنشاء حساب جديد</a>
    </p>
  </div>

  <div class="back-home">
    <a href="index.html">
      <i class='bx bx-arrow-back'></i>
      العودة للصفحة الرئيسية
    </a>
  </div>
</div>

<script>
let currentRole = 'patient';

function switchRole(el){
  document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentRole = el.dataset.role;
}

function togglePassword(){
  const inp = document.getElementById('password');
  const icon = document.getElementById('togglePassword');
  if(inp.type === 'password'){
    inp.type = 'text';
    icon.classList.remove('bx-hide');
    icon.classList.add('bx-show');
  } else {
    inp.type = 'password';
    icon.classList.remove('bx-show');
    icon.classList.add('bx-hide');
  }
}

function handleLogin(e){
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;

  // Demo authentication (يمكن ربطه بـ backend لاحقاً)
  if(password.length < 6){
    showAlert('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'danger');
    return;
  }

  // Simulate successful login
  showAlert('تم تسجيل الدخول بنجاح! جاري التحويل...', 'success');
  
  setTimeout(()=>{
    if(currentRole === 'patient') window.location.href = 'patient-dashboard.html';
    else if(currentRole === 'doctor') window.location.href = 'doctor-dashboard.html';
    else if(currentRole === 'admin') window.location.href = 'admin.html';
  }, 1500);
}

function showAlert(msg, type){
  const alert = document.getElementById('alert');
  alert.textContent = msg;
  alert.className = `alert alert-${type} show`;
  setTimeout(()=>alert.classList.remove('show'), 4000);
}
</script>
</body>
</html>
